spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Mail (required for invite and admin notifications)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}

server.port=8081

app.frontend-url=http://localhost:5173
app.invite.activation-path=/activate
app.invite.activation-token-hours=48
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:no-reply@smartcampus.local}}
app.admin.notification-email=${ADMIN_NOTIFICATION_EMAIL:}
app.ticket.attachments-dir=${TICKET_ATTACHMENTS_DIR:storage/ticket-attachments}
app.ticket.max-attachments=${TICKET_MAX_ATTACHMENTS:3}
app.ticket.max-attachment-size-bytes=${TICKET_MAX_ATTACHMENT_SIZE_BYTES:5242880}

spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=20MB

